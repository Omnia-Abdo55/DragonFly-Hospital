<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up</title>
    <link rel="stylesheet" href="css/SignUp.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
   
</head>

<body>
    <div class="wrapper">
<form action="index.html" id="form" autocomplete="off">

<div class="title">
    <h1>Create Account</h1>
    <i class='bx bxs-user-account'></i>
</div>

<p class="desc">
    Join DragonFly Hospital and manage your appointments easily.
</p>
    <div class="inputbox">
<label for="Name">Your Full Name :</label>
<input type="text" placeholder="Enter your Name" id="Name" name="Name" required> 
 </div>

<div class="inputbox">
<label for="number">Your Phone Number :</label>
<input
type="tel"
placeholder="Enter your Phone Number"
required>
</div>
<div class="inputbox">
<label for="email">Your email :</label> 
<input type="email" placeholder="Enter your email" id="email" name="email" required>  
</div>

<div class="inputbox">
<label for="pass">Your Password :</label>  
<input type="password" placeholder="Enter your Password" minlength="8"  id="pass"name="pass" required>
</div>

<div class="inputbox">

<label for="confirm">
Confirm Password :
</label>

<input
type="password"
id="confirm"
placeholder="Confirm Password"
required>

</div>

<div class="inputbox">
<label for="bd">Your Birth Date :</label> 
<input type="date" placeholder="Enter your Birthdate" id="bd" name="bd" required> <br>
</div>
<button type="submit" class="btn">Sign Up</button>  
<div class="login-link">

Already have an account?
<div class="login-link">
    Already have an account?
    <a href="login.html">Login</a>
</div>

</div>
<div class="anotherSignUp">
<p>Or Sign Up with ?</p>
  <div class="icon">
    <i class='bx bxl-facebook-circle'></i>
    <i class='bx bxl-linkedin-square'></i>
   <i class='bx bxl-google'></i>
  </div>
</div>

<p class="terms">

By creating an account you agree to our

<a href="#">

Terms & Conditions

</a>

</p>
</form>
</div>
</div>
</body>
</html>
